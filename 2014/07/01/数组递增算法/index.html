<p>Question：已经一个由数字构成的数组，用Javascript求出数组里面递增最长的数组（不考虑等长情况）</p>
</blockquote>
<a id="more"></a>
<figure class="highlight javascript"><table><tr><td class="code"><pre><div class="line"><span class="comment">//设定一个原数组</span></div><div class="line"><span class="keyword">var</span> orignalArray = [<span class="number">1</span>,<span class="number">2</span>,<span class="number">4</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">7</span>,<span class="number">8</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">7</span>,<span class="number">8</span>,<span class="number">9</span>,<span class="number">2</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">78</span>,<span class="number">3</span>,<span class="number">2</span>,<span class="number">4</span>,<span class="number">6</span>,<span class="number">7</span>,<span class="number">9</span>,<span class="number">1</span>,<span class="number">2</span>,<span class="number">3</span>,<span class="number">4</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">7</span>,<span class="number">8</span>,<span class="number">9</span>];</div><div class="line"><span class="keyword">var</span> idx = <span class="number">0</span>,result = &#123;</div><div class="line">  <span class="attr">max</span> : <span class="literal">null</span>,</div><div class="line">  <span class="attr">resultArray</span> : []</div><div class="line">&#125;;</div><div class="line"></div><div class="line"><span class="comment">//调用函数求出递增最长数组</span></div><div class="line">sortArray(orignalArray);</div><div class="line"></div><div class="line">  </div><div class="line"><span class="function"><span class="keyword">function</span> <span class="title">sortArray</span>(<span class="params">orignalArray</span>)</span>&#123;</div><div class="line"></div><div class="line">  <span class="keyword">var</span> length = orignalArray.length;</div><div class="line"></div><div class="line">  <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="number">0</span>; i &lt; length; i++) &#123;</div><div class="line">    <span class="comment">//这里的i === length-1表示已经到最末尾的情况</span></div><div class="line">    <span class="keyword">if</span>(orignalArray[i] &gt; orignalArray[i+<span class="number">1</span>] || i === length - <span class="number">1</span>)&#123;           </div><div class="line"></div><div class="line">      <span class="keyword">var</span> tempArray = orignalArray.slice(idx,i+<span class="number">1</span>); </div><div class="line">      idx = i+<span class="number">1</span>;</div><div class="line"></div><div class="line">      <span class="comment">//如果切割出来的数组比原先存在result里面的数组长度要长，就替换掉原来result里面的数组</span></div><div class="line">      <span class="keyword">if</span>(tempArray.length &gt; result.max)&#123;</div><div class="line">        result.max = tempArray.length;</div><div class="line">        result.resultArray = [];  </div><div class="line">        result.resultArray.push(tempArray);</div><div class="line">      &#125;</div><div class="line">        </div><div class="line">    &#125;</div><div class="line">  &#125;;</div><div class="line">  <span class="comment">//打印出结果</span></div><div class="line">  <span class="built_in">console</span>.log(result)</div><div class="line">&#125;</div></pre></td></tr></table></figure>
