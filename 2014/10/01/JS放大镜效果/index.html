<p>本文将利用原生JS打造一个放大镜效果</p>
</blockquote>
<a id="more"></a>
<p>HTML部分：</p>
<figure class="highlight html"><table><tr><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"demo"</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"small-box"</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"mark"</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"float-box"</span>&gt;</span><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">img</span> <span class="attr">src</span>=<span class="string">"small.jpg"</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">div</span> <span class="attr">id</span>=<span class="string">"big-box"</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">img</span> <span class="attr">src</span>=<span class="string">"big.jpg"</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br></pre></td></tr></table></figure>
<p>CSS部分：</p>
<figure class="highlight"><table><tr><td class="code"><pre><span class="line">* &#123;</span><br><span class="line">    margin: 0;</span><br><span class="line">    padding: 0</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#demo &#123;</span><br><span class="line">    display: block;</span><br><span class="line">    width: 400px;</span><br><span class="line">    height: 255px;</span><br><span class="line">    margin: 50px;</span><br><span class="line">    position: relative;</span><br><span class="line">    border: 1px solid #ccc;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#small-box &#123;</span><br><span class="line">    position: relative;</span><br><span class="line">    z-index: 1;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#float-box &#123;</span><br><span class="line">    display: none;</span><br><span class="line">    width: 160px;</span><br><span class="line">    height: 120px;</span><br><span class="line">    position: absolute;</span><br><span class="line">    background: #ffffcc;</span><br><span class="line">    border: 1px solid #ccc;</span><br><span class="line">    filter: alpha(opacity=50);</span><br><span class="line">    opacity: 0.5;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#mark &#123;</span><br><span class="line">    position: absolute;</span><br><span class="line">    display: block;</span><br><span class="line">    width: 400px;</span><br><span class="line">    height: 255px;</span><br><span class="line">    background-color: #fff;</span><br><span class="line">    filter: alpha(opacity=0);</span><br><span class="line">    opacity: 0;</span><br><span class="line">    z-index: 10;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#big-box &#123;</span><br><span class="line">    display: none;</span><br><span class="line">    position: absolute;</span><br><span class="line">    top: 0;</span><br><span class="line">    left: 460px;</span><br><span class="line">    width: 400px;</span><br><span class="line">    height: 300px;</span><br><span class="line">    overflow: hidden;</span><br><span class="line">    border: 1px solid #ccc;</span><br><span class="line">    z-index: 1;;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line">#big-box img &#123;</span><br><span class="line">    position: absolute;</span><br><span class="line">    z-index: 5</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
<p>JS部分：</p>
<figure class="highlight javascript"><table><tr><td class="code"><pre><span class="line"><span class="comment">//页面加载完毕后执行</span></span><br><span class="line"><span class="built_in">window</span>.onload = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line"></span><br><span class="line">    <span class="keyword">var</span> objDemo = <span class="built_in">document</span>.getElementById(<span class="string">"demo"</span>);</span><br><span class="line">    <span class="keyword">var</span> objSmallBox = <span class="built_in">document</span>.getElementById(<span class="string">"small-box"</span>);</span><br><span class="line">    <span class="keyword">var</span> objMark = <span class="built_in">document</span>.getElementById(<span class="string">"mark"</span>);</span><br><span class="line">    <span class="keyword">var</span> objFloatBox = <span class="built_in">document</span>.getElementById(<span class="string">"float-box"</span>);</span><br><span class="line">    <span class="keyword">var</span> objBigBox = <span class="built_in">document</span>.getElementById(<span class="string">"big-box"</span>);</span><br><span class="line">    <span class="keyword">var</span> objBigBoxImage = objBigBox.getElementsByTagName(<span class="string">"img"</span>)[<span class="number">0</span>];</span><br><span class="line"></span><br><span class="line">    objMark.onmouseover = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        objFloatBox.style.display = <span class="string">"block"</span></span><br><span class="line">        objBigBox.style.display = <span class="string">"block"</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    objMark.onmouseout = <span class="function"><span class="keyword">function</span> (<span class="params"></span>) </span>&#123;</span><br><span class="line">        objFloatBox.style.display = <span class="string">"none"</span></span><br><span class="line">        objBigBox.style.display = <span class="string">"none"</span></span><br><span class="line">    &#125;</span><br><span class="line"></span><br><span class="line">    objMark.onmousemove = <span class="function"><span class="keyword">function</span> (<span class="params">ev</span>) </span>&#123;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> _event = ev || <span class="built_in">window</span>.event;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> left = _event.clientX - objDemo.offsetLeft - objSmallBox.offsetLeft - objFloatBox.offsetWidth / <span class="number">2</span>;</span><br><span class="line">        <span class="keyword">var</span> top = _event.clientY - objDemo.offsetTop - objSmallBox.offsetTop - objFloatBox.offsetHeight / <span class="number">2</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (left &lt; <span class="number">0</span>) &#123;</span><br><span class="line">            left = <span class="number">0</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (left &gt; (objMark.offsetWidth - objFloatBox.offsetWidth)) &#123;</span><br><span class="line">            left = objMark.offsetWidth - objFloatBox.offsetWidth;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">if</span> (top &lt; <span class="number">0</span>) &#123;</span><br><span class="line">            top = <span class="number">0</span>;</span><br><span class="line">        &#125; <span class="keyword">else</span> <span class="keyword">if</span> (top &gt; (objMark.offsetHeight - objFloatBox.offsetHeight)) &#123;</span><br><span class="line">            top = objMark.offsetHeight - objFloatBox.offsetHeight;</span><br><span class="line"></span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        objFloatBox.style.left = left + <span class="string">"px"</span>;</span><br><span class="line">        objFloatBox.style.top = top + <span class="string">"px"</span>;</span><br><span class="line"></span><br><span class="line">        <span class="keyword">var</span> percentX = left / (objMark.offsetWidth - objFloatBox.offsetWidth);</span><br><span class="line">        <span class="keyword">var</span> percentY = top / (objMark.offsetHeight - objFloatBox.offsetHeight);</span><br><span class="line"></span><br><span class="line">        objBigBoxImage.style.left = -percentX * (objBigBoxImage.offsetWidth - objBigBox.offsetWidth) + <span class="string">"px"</span>;</span><br><span class="line">        objBigBoxImage.style.top = -percentY * (objBigBoxImage.offsetHeight - objBigBox.offsetHeight) + <span class="string">"px"</span>;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
