span class="subst">$&#123;<span class="keyword">this</span>.qq&#125;</span> or follow my github page: <span class="subst">$&#123;<span class="keyword">this</span>.github&#125;</span>`</span>);</div><div class="line">    &#125;</div><div class="line">    showMotto(msg) &#123;</div><div class="line">        <span class="built_in">console</span>.log(msg);</div><div class="line">    &#125;</div><div class="line">&#125;</div><div class="line"></div><div class="line"><span class="keyword">let</span> me = <span class="keyword">new</span> Me(<span class="string">'SkyCai'</span>, <span class="string">'Alibaba'</span>, <span class="string">'HangZhou'</span>, <span class="string">'https://github.com/cnt1992'</span>, <span class="string">'1019078860'</span>);</div><div class="line"></div><div class="line">me.sayHello();</div><div class="line">me.showMotto(<span class="string">'where there is a will there is a way'</span>);</div></pre></td></tr></table></figure></div></article></div></section><footer><div class="paginator"></div><div data-thread-key="about/index.html" data-title="一句话介绍" data-url="https://cnt1992.github.io/about/index.html" data-author-key="1" class="ds-thread"></div><script>var duoshuoQuery = {short_name:"cnt1992"};
